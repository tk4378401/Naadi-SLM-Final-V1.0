# File: platformio.ini
; PlatformIO Configuration for ESP32 Ayurvedic Nadi Pariksha
; आयुर्वेदिक नाडी परीक्षा के लिए PlatformIO कॉन्फ़िगरेशन
;
; CRITICAL: Two separate environments to prevent compile clashes
; महत्वपूर्ण: कंपाइल क्लैश को रोकने के लिए दो अलग-अलग वातावरण
; - [env:virtual]: Uses virtual_dummy.cpp only
; - [env:hardware]: Uses hardware_main.cpp only

[platformio]
default_envs = virtual

; ============================================
; Virtual Environment - Emulator Mode
; वर्चुअल वातावरण - एमुलेटर मोड
; ============================================
[env:virtual]
platform = espressif32
board = esp32dev
framework = arduino

; CRITICAL: Build filter to use ONLY virtual_dummy.cpp
; महत्वपूर्ण: केवल virtual_dummy.cpp का उपयोग करने के लिए बिल्ड फ़िल्टर
build_src_filter = +<virtual_dummy.cpp> -<hardware_main.cpp>

; Monitor options / मॉनिटर विकल्प
monitor_speed = 115200

; Serial port options / सीरियल पोर्ट विकल्प
monitor_filters = esp32_exception_decoder

; Build options / बिल्ड विकल्प
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; Upload options / अपलोड विकल्प
upload_speed = 921600

; Lib dependencies / लाइब्रेरी निर्भरताएं
lib_deps = 

; ============================================
; Hardware Environment - Real Piezo Sensor Mode
; हार्डवेयर वातावरण - वास्तविक पाईजो सेंसर मोड
; ============================================
[env:hardware]
platform = espressif32
board = esp32dev
framework = arduino

; CRITICAL: Build filter to use ONLY hardware_main.cpp
; महत्वपूर्ण: केवल hardware_main.cpp का उपयोग करने के लिए बिल्ड फ़िल्टर
build_src_filter = +<hardware_main.cpp> -<virtual_dummy.cpp>

; Monitor options / मॉनिटर विकल्प
monitor_speed = 115200

; Serial port options / सीरियल पोर्ट विकल्प
monitor_filters = esp32_exception_decoder

; Build options / बिल्ड विकल्प
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; Upload options / अपलोड विकल्प
upload_speed = 921600

; Lib dependencies / लाइब्रेरी निर्भरताएं
lib_deps = 
